<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanoHost - Dashboard 2026</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid var(--primary-glow);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            color: var(--primary-glow);
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body class="fade-in">
    <div id="app-root" class="glass-container" style="max-width: 1000px; width: 95%;">
        <header class="cyber-header" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="glitch-text" data-text="Control Panel" style="font-size: 2rem;">Control Panel</h1>
            <button id="logout-btn" class="cyber-btn" style="padding: 10px 20px; font-size: 1rem; border-color: var(--danger-glow); color: var(--danger-glow);">تسجيل خروج</button>
        </header>
        
        <main>
            <div class="dashboard-grid">
                <div class="stat-card">
                    <h3>الخوادم النشطة</h3>
                    <div class="stat-number">12</div>
                </div>
                <div class="stat-card">
                    <h3>حالة الشبكة</h3>
                    <div class="stat-number" style="color: #00ff00;">مستقرة</div>
                </div>
                <div class="stat-card">
                    <h3>الهجمات المصدودة</h3>
                    <div class="stat-number" style="color: var(--danger-glow);">4,092</div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { AuthEngine } from './js/modules/auth.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            // حماية الصفحة: إذا ماكو جلسة، يطردك للرئيسية
            if (!AuthEngine.checkSession()) {
                window.location.href = 'index.html';
            }

            document.getElementById('logout-btn').addEventListener('click', () => {
                AuthEngine.logout();
            });
        });
    </script>
</body>
</html>
